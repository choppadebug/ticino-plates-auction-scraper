name: Carie Auktion Scraper

on:
  schedule:
    - cron: '55 17 * * *'  # 7:55 PM UTC (8:55 PM CET, adjust if needed)
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create outputs directory
      run: mkdir -p outputs

    - name: Debug network
      run: |
        curl -I "https://www.carieauktion.ti.ch/ecari-auktion/ui/app/init"

    - name: Run scraper
      env:
          USE_PROXY: true  # Enable proxy only in CI
      run: python src/ti_plates_scraper.py

    - name: Upload results as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: carie-auktion-results
        path: outputs/
        retention-days: 30

    - name: Commit results back to repo
      if: github.event_name != 'schedule'  # Skip on scheduled runs to avoid loops
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add outputs/
        git commit -m "Add scrape results $(date +%Y-%m-%d_%H-%M-%S)" || echo "No changes to commit"
        git push
