name: Carie Auktion Data Pipeline

permissions:
  contents: write

on:
  schedule:
    - cron: '55 17 * * *'  # 7:55 PM UTC (8:55 PM CET, adjust if needed)
  workflow_dispatch:  # Manual trigger

concurrency:
  group: carie-auktion-data-pipeline
  cancel-in-progress: false

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history to allow commits back to the repo

    - name: Sync with remote branch
      run: git pull --rebase --autostash origin "${GITHUB_REF_NAME}"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create outputs directory
      run: mkdir -p outputs

    - name: Debug network
      run: |
        curl -I "https://www.auktion-ch.ch/auktion/ti/default.aspx" || echo "Failed to reach alternative site"

    - name: Run scraper
      env:
          USE_PROXY: true  # Enable proxy only in CI
      run: python src/ti_plates_scraper_side.py

    - name: Build merged CSV + DuckDB database
      run: python src/build_data_assets.py

    - name: Upload results as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: carie-auktion-results
        path: |
          outputs/
          data/
        retention-days: 30

    - name: Commit results back to repo
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add outputs/ data/
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        git commit -m "Update scrape snapshot and database $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        git push
